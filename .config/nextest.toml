[profile.default]
retries = 0
slow-timeout = { period = "60s" }

[profile.ci]
retries = 0
slow-timeout = { period = "120s" }
fail-fast = false
status-level = "fail"
final-status-level = "fail"
success-output = "never"
failure-output = "immediate-final"

[profile.ci.junit]
path = "junit.xml"
report-name = "spectral-init-tests"

[profile.with-fixtures]
retries = 0
slow-timeout = { period = "120s" }
# Runs ignored tests too (fixture-dependent)

[profile.quiet]
retries = 0
slow-timeout = { period = "120s" }
fail-fast = false
status-level = "fail"
final-status-level = "fail"
success-output = "never"
failure-output = "immediate-final"

[profile.ci-fast]
retries = 0
slow-timeout = { period = "30s" }
fail-fast = false
status-level = "fail"
final-status-level = "fail"
success-output = "never"
failure-output = "immediate-final"
default-filter = 'not test(/warm_restart/) and not test(/accuracy_report/)'
